<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propensity Commission Calculator</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f6f8;--s1:#ffffff;--s2:#eef0f4;
  --border:#e2e5ec;--border2:#c8ccd6;
  --teal:#0f7f57;--teal-dim:#e8f5ef;--teal-mid:#c2e8d6;
  --amber:#92600a;--amber-dim:#fef3e2;
  --red:#b91c1c;--red-dim:#fef2f2;
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --mono:'Courier New',Courier,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:28px 22px;font-size:14px;line-height:1.5;}
.hdr{display:flex;align-items:baseline;gap:14px;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.hdr-title{font-size:16px;font-weight:600;letter-spacing:-0.2px;}
.hdr-sub{font-size:11px;color:var(--text3);font-family:var(--mono);}
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:22px;}
.tab{padding:5px 13px;border-radius:6px;border:1px solid var(--border);background:var(--s1);color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;}
.tab.on{background:var(--teal-dim);border-color:var(--teal-mid);color:var(--teal);}
.tab-role{font-size:10px;opacity:0.6;}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;margin-bottom:20px;}
.mc{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:13px 15px;}
.ml{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.mv{font-size:19px;font-weight:600;font-family:var(--mono);line-height:1.2;color:var(--text);}
.ms{font-size:11px;color:var(--text3);margin-top:3px;}
.ctrls{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:18px;}
.cr{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.cr:last-child{margin-bottom:0;}
.clbl{font-size:12px;color:var(--text2);min-width:148px;}
.cval{font-family:var(--mono);font-size:12px;font-weight:500;min-width:46px;text-align:right;color:var(--text);}
.badge{font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:4px;font-weight:500;min-width:58px;text-align:center;}
.bg{background:#dcfce7;color:#166534;}
.ba{background:#fef9c3;color:#854d0e;}
.br{background:#fee2e2;color:#991b1b;}
input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;background:var(--s2);outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:var(--teal);border:2px solid white;cursor:pointer;}
input[type=range]::-moz-range-thumb{width:15px;height:15px;border-radius:50%;background:var(--teal);border:2px solid white;cursor:pointer;}
.sec-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:9px;}
.rcard{background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:18px;}
.rcard.hi{border-color:var(--teal-mid);background:var(--teal-dim);}
.rcard.warn{border-color:#fca5a5;background:var(--red-dim);}
.brow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;}
.brow:last-child{border-bottom:none;font-size:15px;font-weight:600;padding-top:13px;}
.bl{color:var(--text2);}
.bv{font-family:var(--mono);font-weight:500;color:var(--text);}
.ote-row{display:flex;align-items:center;gap:9px;font-size:11px;color:var(--text3);margin-top:11px;padding-top:11px;border-top:1px solid var(--border);font-family:var(--mono);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.mx-lbl{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:9px;}
.mx{width:100%;border-collapse:collapse;font-size:11px;font-family:var(--mono);}
.mx th{color:var(--text3);font-weight:500;padding:5px 9px;border-bottom:1px solid var(--border);text-align:right;background:var(--s2);}
.mx th:first-child{text-align:left;}
.mx td{padding:6px 9px;border-bottom:1px solid var(--border);text-align:right;color:var(--text2);background:var(--s1);}
.mx td:first-child{text-align:left;color:var(--text3);}
.mx tr.cur td{background:var(--teal-dim);color:var(--text);}
.mx tr.cur td:first-child{color:var(--teal);}
.mx tr:last-child td{border-bottom:none;}
.ote-cell{color:#166534 !important;font-weight:500;}
</style>
</head>
<body>
<div class="hdr">
  <span class="hdr-title">Commission Calculator</span>
  <span class="hdr-sub">Propensity &middot; 2026</span>
</div>
<div class="tabs" id="tabs"></div>
<div class="g4" id="stats"></div>
<div class="ctrls">
  <div class="cr">
    <span class="clbl">NRR attainment</span>
    <input type="range" min="60" max="150" step="1" value="100" id="nsl">
    <span class="cval" id="no">100%</span>
    <span class="badge bg" id="nt">100%</span>
  </div>
  <div class="cr">
    <span class="clbl">Logo retention</span>
    <input type="range" min="60" max="100" step="1" value="100" id="lsl">
    <span class="cval" id="lo">100%</span>
    <span class="badge bg" id="lt">100%</span>
  </div>
</div>
<div class="sec-lbl">Payout breakdown</div>
<div class="rcard" id="rc">
  <div id="bd"></div>
  <div class="ote-row" id="ote"></div>
</div>
<div class="mx-lbl">Full scenario matrix &mdash; total compensation</div>
<table class="mx">
  <thead>
    <tr>
      <th style="text-align:left">NRR scenario</th>
      <th>Logo &lt;80%</th><th>Logo 80&ndash;89%</th><th>Logo 90&ndash;99%</th><th>Logo 100%</th>
    </tr>
  </thead>
  <tbody id="mb"></tbody>
</table>
<script>
var REPS={
  Krystal:{base:115000,ote:190000,quota:2500000,bk:2342718,role:'AM III'},
  Hannah: {base:115000,ote:190000,quota:2500000,bk:1065267,role:'AM III'},
  Ujala:  {base:103000,ote:160000,quota:2000000,bk:1706445,role:'AM II Lead'},
  Garrett:{base:90000, ote:130000,quota:1500000,bk:1342629,role:'AM I'},
  Shayne: {base:85000, ote:130000,quota:1500000,bk:1082223,role:'AM I'},
  Nicole: {base:95000, ote:130000,quota:1500000,bk:633159, role:'AM I'}
};
var RATES={
  '<80':  {'<80':0.005,'80-89':0.009,'90-99':0.010,'100':0.013},
  '80-89':{'<80':0.010,'80-89':0.018,'90-99':0.020,'100':0.025},
  '90-99':{'<80':0.013,'80-89':0.023,'90-99':0.025,'100':0.031},
  '100':  {'<80':0.015,'80-89':0.027,'90-99':0.030,'100':0.038}
};
var ACCEL={'<80':0.00,'80-89':0.05,'90-99':0.08,'100':0.10};
function tier(p){return p<80?'<80':p<90?'80-89':p<100?'90-99':'100';}
function tl(t){return t==='<80'?'< 80%':t==='100'?'100%':t+'%';}
function tc(t){return t==='<80'?'br':t==='80-89'?'ba':'bg';}
function fmt(n){return '$'+Math.round(n).toLocaleString();}
function fmtK(n){return n>=1000000?'$'+(n/1000000).toFixed(2)+'M':'$'+Math.round(n/1000)+'K';}
function calc(rep,np,lp){
  var d=REPS[rep],adj=d.bk,end=adj*(np/100);
  var nt=tier(np),lt=tier(lp);
  var effRate=RATES[nt][lt];
  var bn=Math.round(effRate*Math.min(end,adj));
  var ex=np>100?Math.round(ACCEL[lt]*Math.max(0,end-adj)):0;
  var v=bn+ex;
  return{adj:adj,end:Math.round(end),nt:nt,lt:lt,
    effRate:effRate,bn:bn,la:0,ex:ex,v:v,tot:Math.round(d.base+v)};
}
var NRR_ROWS=[['Floor (70%)',70],['Low (80%)',80],['Below (85%)',85],
  ['On plan (90%)',90],['Near (95%)',95],['At quota (100%)',100],
  ['Above (110%)',110],['Strong (120%)',120]];
var LOGO_COLS=[['<80',75],['80-89',85],['90-99',95],['100',100]];
var cur='Krystal';
function buildTabs(){
  var h='';
  for(var r in REPS){
    h+='<button class="tab'+(r===cur?' on':'')+'" onclick="sel(\''+r+'\')">'+r+' <span class="tab-role">'+REPS[r].role+'</span></button>';
  }
  document.getElementById('tabs').innerHTML=h;
}
function upd(){
  var np=+document.getElementById('nsl').value;
  var lp=+document.getElementById('lsl').value;
  var d=REPS[cur],r=calc(cur,np,lp);
  var nt=tier(np),lt=tier(lp);
  document.getElementById('no').textContent=np+'%';
  document.getElementById('lo').textContent=lp+'%';
  var ntEl=document.getElementById('nt');ntEl.textContent=tl(nt);ntEl.className='badge '+tc(nt);
  var ltEl=document.getElementById('lt');ltEl.textContent=tl(lt);ltEl.className='badge '+tc(lt);
  var bkPct=Math.round(d.bk/(d.quota*9/12)*100);
  document.getElementById('stats').innerHTML=
    '<div class="mc"><div class="ml">Base salary</div><div class="mv">'+fmt(d.base)+'</div></div>'+
    '<div class="mc"><div class="ml">OTE</div><div class="mv">'+fmt(d.ote)+'</div><div class="ms">'+d.role+'</div></div>'+
    '<div class="mc"><div class="ml">Starting book</div><div class="mv" style="font-size:15px">'+fmtK(d.bk)+'</div><div class="ms">'+bkPct+'% of 9-mo quota</div></div>'+
    '<div class="mc"><div class="ml">Adj target</div><div class="mv" style="font-size:15px">'+fmtK(d.bk)+'</div><div class="ms">No pipeline in baseline</div></div>';
  var isOver=r.tot>=d.ote;
  var at100=calc(cur,100,100);
  var gap=d.ote-at100.tot;
  var rc=document.getElementById('rc');
  rc.className='rcard'+(isOver?' hi':gap>20000?' warn':'');
  document.getElementById('bd').innerHTML=
    '<div class="brow"><span class="bl">Adjusted target</span><span class="bv">'+fmt(r.adj)+'</span></div>'+
    '<div class="brow"><span class="bl">Ending book ('+np+'% NRR)</span><span class="bv">'+fmt(r.end)+'</span></div>'+
    '<div class="brow"><span class="bl">Commission on target ('+((r.effRate||0)*100).toFixed(1)+'%)</span><span class="bv">'+fmt(r.bn)+'</span></div>'+
    '<div class="brow"><span class="bl">Accelerator on excess'+(np>100?' ('+ACCEL[lt]*100+'% &times; '+fmt(r.end-r.adj)+')':(': n/a &mdash; NRR &le; 100%'))+'</span><span class="bv" style="color:#166534">'+(r.ex>0?'+':'')+fmt(r.ex)+'</span></div>'+
    '<div class="brow"><span class="bl">Total variable comp</span><span class="bv">'+fmt(r.v)+'</span></div>'+
    '<div class="brow"><span class="bl">Total compensation</span><span class="bv" style="font-size:18px;color:'+(isOver?'#166534':r.tot>d.ote*0.85?'#92600a':'var(--text)')+'">'+fmt(r.tot)+'</span></div>';
  var oteGap=r.tot-d.ote;
  var oteColor=oteGap>=0?'#166534':oteGap>-10000?'#92600a':'#991b1b';
  var needNRR='';
  if(gap>0&&np<=100){for(var n=np;n<=200;n++){if(calc(cur,n,100).tot>=d.ote){needNRR='OTE needs '+n+'% NRR at 100% logo';break;}}}
  document.getElementById('ote').innerHTML=
    '<div class="dot" style="background:'+oteColor+'"></div>'+
    '<span style="color:'+oteColor+'">'+(oteGap>=0?'+':'')+fmt(oteGap)+' vs OTE ('+fmt(d.ote)+')</span>'+
    (needNRR?'<span style="margin-left:auto">'+needNRR+'</span>':'');
  var curNT=tier(np),html='';
  for(var i=0;i<NRR_ROWS.length;i++){
    var lb=NRR_ROWS[i][0],n=NRR_ROWS[i][1];
    html+='<tr'+(tier(n)===curNT?' class="cur"':'')+'><td>'+lb+'</td>';
    for(var j=0;j<LOGO_COLS.length;j++){
      var rv=calc(cur,n,LOGO_COLS[j][1]);
      html+='<td'+(rv.tot>=d.ote?' class="ote-cell"':'')+'>'+fmt(rv.tot)+'</td>';
    }
    html+='</tr>';
  }
  document.getElementById('mb').innerHTML=html;
}
function sel(r){cur=r;buildTabs();upd();}
document.getElementById('nsl').addEventListener('input',upd);
document.getElementById('lsl').addEventListener('input',upd);
buildTabs();upd();
</script>
</body>
</html>
