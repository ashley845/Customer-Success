<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propensity Commission Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --teal: #1db87e;
    --teal-dim: rgba(29,184,126,0.12);
    --teal-mid: rgba(29,184,126,0.25);
    --amber: #f0a830;
    --amber-dim: rgba(240,168,48,0.12);
    --red: #e24b4b;
    --red-dim: rgba(226,75,75,0.12);
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555c72;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px;
    font-size: 14px;
    line-height: 1.5;
  }

  .header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header span { font-size: 12px; color: var(--text3); font-family: var(--mono); }

  .rep-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .rep-tab {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text2);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .rep-tab:hover { border-color: var(--border2); color: var(--text); }
  .rep-tab.active {
    background: var(--teal-dim);
    border-color: rgba(29,184,126,0.4);
    color: var(--teal);
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 24px; }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .stat-label { font-size: 11px; color: var(--text3); font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .stat-val { font-size: 20px; font-weight: 600; font-family: var(--mono); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  .ctrl-row:last-child { margin-bottom: 0; }
  .ctrl-label { font-size: 13px; color: var(--text2); min-width: 160px; }
  .ctrl-val { font-family: var(--mono); font-size: 13px; font-weight: 500; min-width: 52px; text-align: right; }
  .tier-badge {
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
    min-width: 60px;
    text-align: center;
  }
  .tier-green  { background: rgba(29,184,126,0.15); color: #1db87e; }
  .tier-amber  { background: rgba(240,168,48,0.15);  color: #f0a830; }
  .tier-red    { background: rgba(226,75,75,0.15);   color: #e24b4b; }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: var(--surface2);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--teal);
    border: 2px solid var(--bg);
    cursor: pointer;
    transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .result-card.highlight {
    border-color: rgba(29,184,126,0.3);
    background: linear-gradient(135deg, rgba(29,184,126,0.06) 0%, var(--surface) 60%);
  }
  .result-card.warn {
    border-color: rgba(226,75,75,0.3);
    background: linear-gradient(135deg, rgba(226,75,75,0.06) 0%, var(--surface) 60%);
  }

  .breakdown {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .brow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .brow:last-child { border-bottom: none; font-size: 15px; font-weight: 600; padding-top: 14px; }
  .brow-label { color: var(--text2); }
  .brow-val { font-family: var(--mono); font-weight: 500; }

  .matrix-section { margin-bottom: 24px; }
  .matrix-title {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .matrix {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    font-family: var(--mono);
  }
  .matrix th {
    color: var(--text3);
    font-weight: 500;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    font-size: 11px;
  }
  .matrix th:first-child { text-align: left; }
  .matrix td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    text-align: right;
    color: var(--text2);
  }
  .matrix td:first-child { text-align: left; color: var(--text3); }
  .matrix tr.cur-row td { background: var(--teal-dim); color: var(--text); }
  .matrix tr.cur-row td:first-child { color: var(--teal); }
  .matrix tr:last-child td { border-bottom: none; }

  .ote-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--text3);
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
  }
  .ote-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .section-label {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
</style>
</head>
<body>

<div class="header">
  <h1>Commission Calculator</h1>
  <span>Propensity · 2026</span>
</div>

<div class="rep-tabs" id="tabs"></div>

<div class="grid4" id="stats"></div>

<div class="controls">
  <div class="ctrl-row">
    <span class="ctrl-label">NRR attainment</span>
    <input type="range" min="60" max="150" step="1" value="100" id="nrr-sl">
    <span class="ctrl-val" id="nrr-out">100%</span>
    <span class="tier-badge tier-green" id="nrr-tier">100%</span>
  </div>
  <div class="ctrl-row">
    <span class="ctrl-label">Logo retention</span>
    <input type="range" min="60" max="100" step="1" value="100" id="logo-sl">
    <span class="ctrl-val" id="logo-out">100%</span>
    <span class="tier-badge tier-green" id="logo-tier">100%</span>
  </div>
</div>

<div class="section-label">Payout breakdown</div>
<div class="result-card" id="result-card">
  <div class="breakdown" id="breakdown"></div>
  <div class="ote-indicator" id="ote-indicator"></div>
</div>

<div class="matrix-section">
  <div class="matrix-title">Full scenario matrix — total compensation</div>
  <table class="matrix">
    <thead>
      <tr>
        <th>NRR scenario</th>
        <th>Logo &lt;80%</th>
        <th>Logo 80–89%</th>
        <th>Logo 90–99%</th>
        <th>Logo 100%</th>
      </tr>
    </thead>
    <tbody id="matrix-body"></tbody>
  </table>
</div>

<script>
const REPS = {
  Krystal: { base:115000, ote:190000, quota:2500000, bk:2342718, role:'AM III' },
  Hannah:  { base:115000, ote:190000, quota:2500000, bk:1065267, role:'AM III' },
  Ujala:   { base:103000, ote:160000, quota:2000000, bk:1706445, role:'AM II Lead' },
  Garrett: { base:90000,  ote:130000, quota:1500000, bk:1342629, role:'AM I' },
  Shayne:  { base:85000,  ote:130000, quota:1500000, bk:1082223, role:'AM I' },
  Nicole:  { base:95000,  ote:130000, quota:1500000, bk:633159,  role:'AM I' },
};

const NR  = {'<80':0.01,'80-89':0.02,'90-99':0.025,'100':0.03};
const LM  = {'<80':0.5,'80-89':0.9,'90-99':1.0,'100':1.25};
const ER  = {'<80':0,'80-89':0.05,'90-99':0.075,'100':0.10};

function tier(p)  { return p<80?'<80':p<90?'80-89':p<100?'90-99':'100'; }
function tLabel(t){ return t==='<80'?'< 80%':t==='100'?'100%':t+'%'; }
function tClass(t){ return t==='<80'?'tier-red':t==='80-89'?'tier-amber':'tier-green'; }
function fmt(n)   { return '$'+Math.round(n).toLocaleString(); }
function fmtK(n)  { return n>=1000000?'$'+(n/1000000).toFixed(2)+'M':'$'+(n/1000).toFixed(0)+'K'; }

function calc(rep, nrrP, logoP) {
  const d=REPS[rep], adj=d.bk, end=adj*(nrrP/100);
  const nt=tier(nrrP), lt=tier(logoP);
  const bn=NR[nt]*Math.min(end,adj);
  const la=bn*(LM[lt]-1);
  const ex=nrrP>=100?ER[nt]*Math.max(0,end-adj):0;
  const v=bn+la+ex;
  return {adj,end,nt,lt,bn:Math.round(bn),la:Math.round(la),ex:Math.round(ex),v:Math.round(v),tot:Math.round(d.base+v)};
}

const NRR_ROWS=[
  ['Floor (70%)',70],['Low (80%)',80],['Below (85%)',85],
  ['On plan (90%)',90],['Near (95%)',95],['At quota (100%)',100],
  ['Above (110%)',110],['Strong (120%)',120],
];
const LOGO_COLS=[['<80',75],['80-89',85],['90-99',95],['100',100]];

let cur = 'Krystal';

function buildTabs() {
  document.getElementById('tabs').innerHTML = Object.entries(REPS).map(([r,d])=>
    `<button class="rep-tab${r===cur?' active':''}" onclick="sel('${r}')">${r} <span style="font-size:10px;opacity:.6">${d.role}</span></button>`
  ).join('');
}

function update() {
  const np=+document.getElementById('nrr-sl').value;
  const lp=+document.getElementById('logo-sl').value;
  const d=REPS[cur], r=calc(cur,np,lp);
  const nt=tier(np), lt=tier(lp);

  document.getElementById('nrr-out').textContent=np+'%';
  document.getElementById('logo-out').textContent=lp+'%';
  const ntEl=document.getElementById('nrr-tier');
  ntEl.textContent=tLabel(nt); ntEl.className='tier-badge '+tClass(nt);
  const ltEl=document.getElementById('logo-tier');
  ltEl.textContent=tLabel(lt); ltEl.className='tier-badge '+tClass(lt);

  const bkPct=Math.round(d.bk/(d.quota*9/12)*100);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Base salary</div><div class="stat-val">${fmt(d.base)}</div></div>
    <div class="stat"><div class="stat-label">OTE</div><div class="stat-val">${fmt(d.ote)}</div><div class="stat-sub">${d.role}</div></div>
    <div class="stat"><div class="stat-label">Starting book</div><div class="stat-val" style="font-size:16px;">${fmtK(d.bk)}</div><div class="stat-sub">${bkPct}% of 9-mo quota</div></div>
    <div class="stat"><div class="stat-label">Adj target</div><div class="stat-val" style="font-size:16px;">${fmtK(d.bk)}</div><div class="stat-sub">No pipeline in baseline</div></div>
  `;

  const at100=calc(cur,100,100);
  const gap=d.ote-at100.tot;
  const isOver=r.tot>=d.ote;
  const card=document.getElementById('result-card');
  card.className='result-card'+(isOver?' highlight':gap>20000?' warn':'');

  document.getElementById('breakdown').innerHTML=`
    <div class="brow"><span class="brow-label">Adjusted target</span><span class="brow-val">${fmt(r.adj)}</span></div>
    <div class="brow"><span class="brow-label">Ending book (${np}% of adj target)</span><span class="brow-val">${fmt(r.end)}</span></div>
    <div class="brow"><span class="brow-label">NRR commission rate (${tLabel(nt)} tier)</span><span class="brow-val">${(NR[nt]*100).toFixed(1)}%</span></div>
    <div class="brow"><span class="brow-label">Base NRR commission</span><span class="brow-val">${fmt(r.bn)}</span></div>
    <div class="brow"><span class="brow-label">Logo retention adj (${LM[lt]}×)</span><span class="brow-val" style="color:${r.la>=0?'#1db87e':'#e24b4b'}">${r.la>=0?'+':''}${fmt(r.la)}</span></div>
    <div class="brow"><span class="brow-label">Expansion commission</span><span class="brow-val" style="color:#1db87e">${r.ex>0?'+':''}${fmt(r.ex)}</span></div>
    <div class="brow"><span class="brow-label">Total variable comp</span><span class="brow-val">${fmt(r.v)}</span></div>
    <div class="brow"><span class="brow-label">Total compensation</span><span class="brow-val" style="color:${isOver?'#1db87e':r.tot>d.ote*0.85?'#f0a830':'var(--text)'};font-size:18px">${fmt(r.tot)}</span></div>
  `;

  const oteGap=r.tot-d.ote;
  const oteColor=oteGap>=0?'#1db87e':oteGap>-10000?'#f0a830':'#e24b4b';
  document.getElementById('ote-indicator').innerHTML=`
    <div class="ote-dot" style="background:${oteColor}"></div>
    <span style="color:${oteColor}">${oteGap>=0?'+':''}${fmt(oteGap)} vs OTE (${fmt(d.ote)})</span>
    ${gap>0&&np<=100?`<span style="margin-left:auto;color:var(--text3)">OTE needs ${Math.min(200,(() => { for(let n=np;n<=200;n++){if(calc(cur,n,100).tot>=d.ote)return n;} return 200; })())}% NRR at 100% logo</span>`:''}
  `;

  const curNT=tier(np);
  let html='';
  for(const [lb,n] of NRR_ROWS){
    const isCur=tier(n)===curNT;
    html+=`<tr${isCur?' class="cur-row"':''}><td>${lb}</td>`;
    for(const [,lp2] of LOGO_COLS){
      const rv=calc(cur,n,lp2);
      const isOte=rv.tot>=d.ote;
      html+=`<td style="${isOte?'color:#1db87e;':''}">${fmt(rv.tot)}</td>`;
    }
    html+='</tr>';
  }
  document.getElementById('matrix-body').innerHTML=html;
}

function sel(r){ cur=r; buildTabs(); update(); }
['nrr-sl','logo-sl'].forEach(id=>document.getElementById(id).addEventListener('input',update));
buildTabs(); update();
</script>
</body>
</html>
